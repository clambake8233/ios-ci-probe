name: iOS Screenshot

# Screenshot loop the agent can SEE: build the SwiftUI app for the iOS
# Simulator on a macOS runner (real Xcode + real iOS runtime), launch it,
# capture PNGs, and upload them as artifacts. The agent then downloads the
# artifacts and views them with its vision tool — no human QA in the loop.
#
# Runs on GitHub-hosted macOS runners. On a PUBLIC repo, these minutes are FREE.
#
# PERF NOTES (all MEASURED on this repo, 2026-07-15):
#   * Baseline serial run: 407s. ~80% is simulator lifecycle.
#   * TRIED "boot sim first, overlap with brew+build": BACKFIRED. Booting a
#     simulator concurrently starves `brew install` — brew went 22s -> 200s+
#     across three runs. bootstatus_wait DID drop 118s->3s, but the brew
#     regression more than ate the gain. Lesson: the runner can't do a sim
#     boot and a brew bottle-pour in parallel without heavy contention.
#   * TRIED "cache the Homebrew cask": ALSO BACKFIRED. On a warm cache brew
#     sees "artifact has not changed" and SKIPS linking -> `xtool: command
#     not found` (exit 127). And it was pointless: with the concurrent boot
#     removed, a COLD brew install is only 11s. Cache deleted.
#   * KEPT wins (measured, STABLE): drop the diagnostic simctl step,
#     poll-for-rendered-frame instead of fixed sleep, boot the sim serially
#     AFTER install+build. brew=11s and xtool_build=14-18s reproducibly.
#   * RESULT: the CONTROLLABLE cost is minimized and stable (~25s brew+build).
#     But the DOMINANT cost — simulator lifecycle (create/boot/install/launch)
#     — is high-variance on ephemeral runners: measured 152s AND 276s across
#     two identical green runs (JOB total 212s vs 329s). So there is no single
#     "optimized wall-clock" number; it swings with runner contention and
#     first-launch SpringBoard warm-up. ~72-84% of every run is sim lifecycle.
#   * To get a STABLE fast loop you must leave the sim lifecycle behind — i.e.
#     a snapshot-render harness (ImageRenderer / swift-snapshot-testing) that
#     renders SwiftUI without booting a simulator. Deferred until a real app.
#   * [[TIMER]] lines keep every claim measured, not asserted.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshot:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      BUNDLE_ID: com.example.ScreenshotProbe
      DEVICE: iPhone 16 Pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No Homebrew cache: a cold `brew install` is only 11s here, and caching
      # the cask makes brew skip linking on warm runs (xtool: command not found).
      - name: Install xtool
        run: |
          set -euxo pipefail
          t0=$(date +%s)
          brew install xtool-org/tap/xtool || brew install --cask xtool-org/tap/xtool
          xtool --version
          t1=$(date +%s); echo "[[TIMER]] brew_install_xtool $((t1-t0))s"

      - name: Build app for iOS Simulator
        run: |
          set -euxo pipefail
          t0=$(date +%s)
          xtool dev build --triple arm64-apple-ios-simulator
          t1=$(date +%s); echo "[[TIMER]] xtool_build $((t1-t0))s"
          APP_PATH="$(find . -type d -name '*.app' | head -1)"
          test -n "$APP_PATH" || { echo "::error::no .app produced"; exit 1; }
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      # Boot the sim now (NOT earlier — concurrent boot starves brew). This is
      # the first simctl call, so it absorbs CoreSimulator cold-start here.
      - name: Boot simulator, install, launch, screenshot
        run: |
          set -euxo pipefail
          mkdir -p screenshots

          t0=$(date +%s)
          UDID="$(xcrun simctl create ci-probe "$DEVICE")"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          t1=$(date +%s); echo "[[TIMER]] create_boot_wait $((t1-t0))s"

          xcrun simctl install "$UDID" "$APP_PATH"
          t2=$(date +%s); echo "[[TIMER]] install $((t2-t1))s"

          xcrun simctl launch "$UDID" "$BUNDLE_ID"
          t3=$(date +%s); echo "[[TIMER]] launch $((t3-t2))s"

          # Poll for a rendered frame instead of a fixed sleep.
          for i in 1 2 3 4 5; do
            xcrun simctl io "$UDID" screenshot screenshots/home.png || true
            sz=$(stat -f%z screenshots/home.png 2>/dev/null || echo 0)
            echo "screenshot attempt $i: ${sz} bytes"
            [ "$sz" -gt 100000 ] && break
            sleep 2
          done
          t4=$(date +%s); echo "[[TIMER]] screenshot_poll $((t4-t3))s"
          echo "[[TIMER]] sim_step_total $((t4-t0))s"
          ls -la screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/**
          if-no-files-found: warn
          retention-days: 7
