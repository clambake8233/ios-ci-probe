name: iOS Screenshot

# Screenshot loop the agent can SEE: build the SwiftUI app for the iOS
# Simulator on a macOS runner (real Xcode + real iOS runtime), launch it,
# capture PNGs, and upload them as artifacts. The agent then downloads the
# artifacts and views them with its vision tool — no human QA in the loop.
#
# Runs on GitHub-hosted macOS runners. On a PUBLIC repo (or a public fork),
# these minutes are FREE.
#
# PERF (measured 2026-07-15): ~80% of wall-clock is simulator lifecycle
# (boot-wait + install + launch), not real work. Optimization applied:
#   A. Boot the sim FIRST (returns in ~3s), then overlap brew+build with the
#      OS warming up in the CoreSimulator daemon (persists across steps).
#   C. No separate diagnostic simctl step (early boot pays cold-start once).
# [[TIMER]] lines let us re-measure the real gain vs. the 407s baseline.

on:
  push:
    branches: ["**"]
  workflow_dispatch:      # lets the agent trigger a run on demand

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshot:
    runs-on: macos-15     # macOS runner ships Xcode + simulators preinstalled
    timeout-minutes: 30
    env:
      BUNDLE_ID: com.example.ScreenshotProbe
      DEVICE: iPhone 16 Pro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A: kick the simulator boot off IMMEDIATELY. `boot` returns in ~3s; the
      # OS keeps warming in the background daemon while brew+build run. This is
      # the first simctl call, so it also absorbs the one-time CoreSimulator
      # cold-start here instead of in a throwaway diagnostic step.
      - name: Start simulator boot (async)
        run: |
          set -euxo pipefail
          t0=$(date +%s)
          UDID="$(xcrun simctl create ci-probe "$DEVICE")"
          echo "UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          t1=$(date +%s); echo "[[TIMER]] create_plus_boot_return $((t1-t0))s"

      # macOS runners ship the iOS SDK with Xcode, so xtool builds against it
      # directly (no Linux Darwin-SDK dance). Homebrew is preinstalled.
      # This step runs WHILE the sim warms up.
      - name: Install xtool
        run: |
          set -euxo pipefail
          t0=$(date +%s)
          brew install xtool-org/tap/xtool
          xtool --version
          t1=$(date +%s); echo "[[TIMER]] brew_install_xtool $((t1-t0))s"

      - name: Build app for iOS Simulator
        run: |
          set -euxo pipefail
          t0=$(date +%s)
          xtool dev build --triple arm64-apple-ios-simulator
          t1=$(date +%s); echo "[[TIMER]] xtool_build $((t1-t0))s"
          APP_PATH="$(find . -type d -name '*.app' | head -1)"
          test -n "$APP_PATH" || { echo "::error::no .app produced"; exit 1; }
          echo "resolved APP_PATH=$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      # By now the sim has had ~50s to warm. bootstatus should return fast, and
      # install/launch should be quicker against an already-online sim.
      - name: Wait for boot, install, launch, screenshot
        run: |
          set -euxo pipefail
          mkdir -p screenshots

          t0=$(date +%s)
          xcrun simctl bootstatus "$UDID" -b
          t1=$(date +%s); echo "[[TIMER]] bootstatus_wait $((t1-t0))s"

          xcrun simctl install "$UDID" "$APP_PATH"
          t2=$(date +%s); echo "[[TIMER]] install $((t2-t1))s"

          xcrun simctl launch "$UDID" "$BUNDLE_ID"
          t3=$(date +%s); echo "[[TIMER]] launch $((t3-t2))s"

          # Poll for a rendered first frame instead of a fixed sleep: screenshot,
          # and if it's suspiciously tiny (blank), wait and retry a few times.
          for i in 1 2 3 4 5; do
            xcrun simctl io "$UDID" screenshot screenshots/home.png || true
            sz=$(stat -f%z screenshots/home.png 2>/dev/null || echo 0)
            echo "screenshot attempt $i: ${sz} bytes"
            [ "$sz" -gt 100000 ] && break
            sleep 2
          done
          t4=$(date +%s); echo "[[TIMER]] screenshot_poll $((t4-t3))s"

          echo "[[TIMER]] finish_step_total $((t4-t0))s"
          ls -la screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/**
          if-no-files-found: warn
          retention-days: 7
